<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbf9f7">
    <meta name="description" content="Мини-загадка с маленьким сюрпризом.">
    <title>Для тебя</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel panel-riddle" id="riddle-panel" aria-labelledby="page-title">
        <div class="screen-head">
          <p class="overline" id="site-overline"></p>
          <div class="ornament" aria-hidden="true">
            <span></span>
            <i>♡</i>
            <span></span>
          </div>
          <div class="progress-line" id="progress-line" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="intro">
          <div class="hero-heart" aria-hidden="true">♡</div>
          <h1 id="page-title"></h1>
          <p class="riddle-text" id="riddle-text"></p>
          <div class="tiny-ornament" aria-hidden="true">
            <span></span>
            <i>♡</i>
            <span></span>
          </div>
        </div>

        <form class="answer-form" id="answer-form" autocomplete="off">
          <label for="answer-input" id="answer-label"></label>
          <div class="input-row">
            <div class="answer-field">
              <span aria-hidden="true">♡</span>
              <input
                id="answer-input"
                name="answer"
                type="text"
                inputmode="text"
                enterkeyhint="done"
                spellcheck="false"
                aria-describedby="answer-message"
              >
            </div>
            <button type="submit" id="submit-button"></button>
          </div>
          <p class="message" id="answer-message" role="status" aria-live="polite"></p>
        </form>

        <div class="pixel-cat" aria-hidden="true"></div>
      </section>

      <section class="panel panel-success" id="success-panel" aria-labelledby="success-title" hidden>
        <div class="screen-head">
          <p class="overline" id="success-overline"></p>
          <div class="ornament" aria-hidden="true">
            <span></span>
            <i>♡</i>
            <span></span>
          </div>
        </div>

        <div class="success-copy">
          <div class="hero-heart hero-heart-large" aria-hidden="true">♡</div>
          <h2 id="success-title"></h2>
          <p id="success-text"></p>
          <p class="success-note" id="success-note"></p>
        </div>

        <div class="photo-stack">
          <figure class="photo-frame">
            <img id="gift-photo" alt="">
            <figcaption id="gift-caption"></figcaption>
          </figure>

          <figure class="photo-frame">
            <img id="secret-photo" alt="">
            <figcaption id="photo-caption"></figcaption>
          </figure>
        </div>

        <p class="closing" id="closing-text"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
